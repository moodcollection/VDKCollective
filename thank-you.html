<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>VDK Collective — Thank You</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold:       #C9A84C;
      --gold-deep:  #A8893A;
      --charcoal:   #1A1714;
      --black:      #0D0D0D;
      --cream:      #F8F5EF;
      --white:      #FFFFFF;
      --grey:       #6B6B68;
      --grey-light: #9B9893;
      --border:     rgba(26, 23, 20, 0.1);
      --radius:     2px;
      --ease:       cubic-bezier(0.16, 1, 0.3, 1);
      --font-display: 'Cinzel', serif;
      --font-body:    'Cormorant Garamond', serif;
      --font-ui:      -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--cream);
      color: var(--charcoal);
      font-family: var(--font-ui);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .wrap {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .logo {
      height: 32px;
      width: auto;
      margin: 0 auto 40px;
      opacity: 0.9;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--border);
      padding: 48px 40px 44px;
      animation: rise 0.6s var(--ease) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: none; }
    }

    .check-ring {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1.5px solid var(--gold);
      color: var(--gold);
      font-size: 22px;
      margin: 0 auto 28px;
    }

    .eyebrow {
      font-family: var(--font-ui);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold-deep);
      font-weight: 600;
      margin: 0 0 14px;
    }

    h1 {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1.65rem;
      color: var(--charcoal);
      letter-spacing: 0.03em;
      line-height: 1.2;
      margin: 0 0 18px;
    }

    .message {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 1.15rem;
      color: var(--grey);
      line-height: 1.6;
      margin: 0 0 32px;
      max-width: 38ch;
      margin-left: auto;
      margin-right: auto;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 0 28px;
    }

    .detail {
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--grey-light);
      letter-spacing: 0.02em;
      line-height: 1.7;
    }

    .detail a {
      color: var(--gold-deep);
      text-decoration: none;
    }

    footer {
      margin-top: 32px;
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--grey-light);
      letter-spacing: 0.04em;
    }

    @media (max-width: 480px) {
      .card { padding: 36px 24px 32px; }
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>
